version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: attendance_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-attendance}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-attendance_secret_2024}
      POSTGRES_DB: ${DB_NAME:-attendance_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-attendance} -d ${DB_NAME:-attendance_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - attendance_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: attendance_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - attendance_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # Telegram Bot Service
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: attendance_bot
    restart: always
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-attendance}:${DB_PASSWORD:-attendance_secret_2024}@postgres:5432/${DB_NAME:-attendance_db}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - attendance_network
    deploy:
      replicas: ${BOT_REPLICAS:-2}
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # FastAPI Admin API
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: attendance_api
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-attendance}:${DB_PASSWORD:-attendance_secret_2024}@postgres:5432/${DB_NAME:-attendance_db}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-Asia/Shanghai}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - attendance_network
    deploy:
      replicas: ${API_REPLICAS:-2}
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: attendance_worker
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-attendance}:${DB_PASSWORD:-attendance_secret_2024}@postgres:5432/${DB_NAME:-attendance_db}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - attendance_network
    deploy:
      replicas: ${WORKER_REPLICAS:-2}
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # Celery Beat (Scheduler)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: attendance_scheduler
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-attendance}:${DB_PASSWORD:-attendance_secret_2024}@postgres:5432/${DB_NAME:-attendance_db}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - attendance_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: attendance_nginx
    restart: always
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/app/static:ro
    depends_on:
      - api
      - bot
    networks:
      - attendance_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local

networks:
  attendance_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
